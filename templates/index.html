<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bancroft-air</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 4px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    #last-updated { font-size: 0.8rem; color: #666; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px 14px 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 6px;
    }
    .card-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .card-unit {
      font-size: 0.75rem;
      color: #888;
      margin-top: 4px;
    }
    .card-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
      background: #aaa;
    }

    .chart-section {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .chart-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 10px;
    }
    .chart-wrap { position: relative; height: 160px; }

    .range-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
    }
    .range-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .range-btn:hover { border-color: #aaa; color: #222; }
    .range-btn.active {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }

    @media (max-width: 480px) {
      .card-value { font-size: 1.6rem; }
      .range-btn { padding: 3px 7px; font-size: 0.68rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>bancroft-air</h1>
  <span id="last-updated">—</span>
</header>

<div class="cards">
  <div class="card" id="card-co2">
    <div class="card-label">CO₂</div>
    <div class="card-value" id="co2-val">—</div>
    <div class="card-unit">ppm</div>
    <div class="card-badge" id="co2-badge">—</div>
  </div>
  <div class="card">
    <div class="card-label">PM2.5</div>
    <div class="card-value" id="pm25-val">—</div>
    <div class="card-unit">µg/m³</div>
  </div>
  <div class="card">
    <div class="card-label">PM10</div>
    <div class="card-value" id="pm10-val">—</div>
    <div class="card-unit">µg/m³</div>
  </div>
  <div class="card">
    <div class="card-label">Temperature</div>
    <div class="card-value" id="temp-val">—</div>
    <div class="card-unit">°F</div>
  </div>
  <div class="card">
    <div class="card-label">Humidity</div>
    <div class="card-value" id="hum-val">—</div>
    <div class="card-unit">%RH</div>
  </div>
</div>

<div class="range-bar">
  <button class="range-btn active" data-range="1d">1D</button>
  <button class="range-btn" data-range="1w">1W</button>
  <button class="range-btn" data-range="1m">1M</button>
  <button class="range-btn" data-range="3m">3M</button>
  <button class="range-btn" data-range="6m">6M</button>
  <button class="range-btn" data-range="1y">1Y</button>
  <button class="range-btn" data-range="all">ALL</button>
</div>

<div class="chart-section">
  <div class="chart-title" id="title-co2">CO₂ — last 24 hours</div>
  <div class="chart-wrap"><canvas id="co2-chart"></canvas></div>
</div>
<div class="chart-section">
  <div class="chart-title" id="title-pm25">PM2.5 — last 24 hours</div>
  <div class="chart-wrap"><canvas id="pm25-chart"></canvas></div>
</div>
<div class="chart-section">
  <div class="chart-title" id="title-temp">Temperature — last 24 hours</div>
  <div class="chart-wrap"><canvas id="temp-chart"></canvas></div>
</div>

<script>
  const CO2_THRESHOLDS = [
    { max: 800,      label: 'GOOD', color: '#22c55e' },
    { max: 1000,     label: 'OK',   color: '#eab308' },
    { max: 1500,     label: 'POOR', color: '#f97316' },
    { max: Infinity, label: 'BAD!', color: '#ef4444' },
  ];

  function co2Status(ppm) {
    return CO2_THRESHOLDS.find(t => ppm < t.max) || CO2_THRESHOLDS.at(-1);
  }

  function fmt(val, digits = 0) {
    return val != null ? Number(val).toFixed(digits) : '—';
  }

  async function refreshCurrent() {
    try {
      const data = await fetch('/api/now').then(r => r.json());
      document.getElementById('co2-val').textContent  = fmt(data.co2_ppm);
      document.getElementById('pm25-val').textContent = fmt(data.pm25, 1);
      document.getElementById('pm10-val').textContent  = fmt(data.pm10, 1);
      document.getElementById('temp-val').textContent  = fmt(data.temp_c != null ? data.temp_c * 9/5 + 32 : null, 1);
      document.getElementById('hum-val').textContent   = fmt(data.humidity_pct, 1);

      if (data.co2_ppm != null) {
        const status = co2Status(data.co2_ppm);
        const badge  = document.getElementById('co2-badge');
        badge.textContent       = status.label;
        badge.style.background  = status.color;
      }

      const ts = data.timestamp ? new Date(data.timestamp).toLocaleTimeString() : null;
      document.getElementById('last-updated').textContent =
        ts ? `updated ${ts}` : '—';
    } catch (e) {
      console.warn('refreshCurrent error:', e);
    }
  }

  const CHART_DEFAULTS = {
    type: 'line',
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false } },
      elements: { point: { radius: 0 } },
      scales: {
        x: {
          ticks: {
            maxTicksLimit: 6,
            maxRotation: 0,
            font: { size: 10 },
          },
          grid: { color: 'rgba(0,0,0,0.05)' },
        },
        y: {
          beginAtZero: false,
          ticks: { font: { size: 10 } },
          grid: { color: 'rgba(0,0,0,0.05)' },
        },
      },
    },
  };

  let charts = {};
  let currentRange = '1d';
  let chartRefreshTimer = null;

  const RANGE_LABELS = {
    '1d': 'last 24 hours',
    '1w': 'last 7 days',
    '1m': 'last 30 days',
    '3m': 'last 3 months',
    '6m': 'last 6 months',
    '1y': 'last year',
    'all': 'all time',
  };

  function formatLabel(ts, range) {
    const dt = new Date(ts);
    if (range === '1d') {
      return dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } else if (range === '1w') {
      return dt.toLocaleDateString([], { weekday: 'short' }) + ' ' +
             dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } else if (range === '1m' || range === '3m' || range === '6m') {
      return dt.toLocaleDateString([], { month: 'short', day: 'numeric' });
    } else {
      // 1y, all
      return dt.toLocaleDateString([], { month: 'short', year: 'numeric' });
    }
  }

  function makeDataset(label, values, color) {
    return {
      label,
      data: values,
      borderColor: color,
      backgroundColor: color.replace(')', ', 0.1)').replace('rgb', 'rgba'),
      borderWidth: 1.5,
      tension: 0.3,
      fill: true,
    };
  }

  function updateChartTitles(range) {
    const suffix = RANGE_LABELS[range] || range;
    document.getElementById('title-co2').textContent  = `CO₂ — ${suffix}`;
    document.getElementById('title-pm25').textContent = `PM2.5 — ${suffix}`;
    document.getElementById('title-temp').textContent = `Temperature — ${suffix}`;
  }

  async function loadCharts(range) {
    range = range || currentRange;
    try {
      const data = await fetch(`/api/history?range=${range}`).then(r => r.json());
      if (!Array.isArray(data) || !data.length) return;

      const labels = data.map(d => formatLabel(d.timestamp, range));

      if (charts.co2) charts.co2.destroy();
      charts.co2 = new Chart(document.getElementById('co2-chart'), {
        ...CHART_DEFAULTS,
        data: {
          labels,
          datasets: [makeDataset('CO₂ ppm', data.map(d => d.co2_ppm), 'rgb(239,68,68)')],
        },
      });

      if (charts.pm25) charts.pm25.destroy();
      charts.pm25 = new Chart(document.getElementById('pm25-chart'), {
        ...CHART_DEFAULTS,
        data: {
          labels,
          datasets: [makeDataset('PM2.5 µg/m³', data.map(d => d.pm25), 'rgb(168,85,247)')],
        },
      });

      if (charts.temp) charts.temp.destroy();
      charts.temp = new Chart(document.getElementById('temp-chart'), {
        ...CHART_DEFAULTS,
        data: {
          labels,
          datasets: [makeDataset('Temp °F', data.map(d => d.temp_c != null ? d.temp_c * 9/5 + 32 : null), 'rgb(34,197,94)')],
        },
      });
    } catch (e) {
      console.warn('loadCharts error:', e);
    }
  }

  function setRange(range) {
    currentRange = range;
    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.range === range);
    });
    updateChartTitles(range);
    loadCharts(range);
    // Reset auto-refresh timer so it counts from now
    if (chartRefreshTimer) clearInterval(chartRefreshTimer);
    chartRefreshTimer = setInterval(() => loadCharts(currentRange), 60000);
  }

  document.querySelectorAll('.range-btn').forEach(btn => {
    btn.addEventListener('click', () => setRange(btn.dataset.range));
  });

  refreshCurrent();
  loadCharts('1d');
  setInterval(refreshCurrent, 10000);
  chartRefreshTimer = setInterval(() => loadCharts(currentRange), 60000);
</script>
</body>
</html>
