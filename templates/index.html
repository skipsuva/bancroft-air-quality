<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bancroft Air</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    @keyframes flow { to { stroke-dashoffset: -14; } }
    @keyframes livepulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .tab-btn {
      flex: 1; border: none; cursor: pointer; padding: 8px 0;
      border-radius: 10px; font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 800;
    }
    .tab-btn.active  { background: #fff; color: #3a322a; box-shadow: 0 2px 6px -3px rgba(120,90,60,.4); }
    .tab-btn.inactive { background: transparent; color: #a99a88; }
  </style>
</head>
<body style="min-height:100vh; background:#e9eaee; font-family:'Nunito',sans-serif; color:#3a322a; padding:16px 16px 70px; margin:0;">

<div style="max-width:520px; margin:0 auto; background:#fbf7f2; border-radius:24px; overflow:hidden;">

  <!-- Status bar -->
  <div style="display:flex; justify-content:space-between; align-items:center; padding:14px 28px 4px; font-size:13px; font-weight:700; color:#4a4036;">
    <span style="display:flex; gap:5px; align-items:center;">
      <span style="width:7px; height:7px; border-radius:50%; background:#34c759; display:inline-block; animation:livepulse 2.4s ease-in-out infinite;"></span>
      <span style="font-size:11px; color:#a99a88; font-weight:700;">live</span>
    </span>
  </div>

  <div style="padding:6px 16px 16px;">

    <!-- Header -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin:2px 2px 12px;">
      <div>
        <div style="font-size:22px; font-weight:800; letter-spacing:-.02em; color:#3a322a;">Bancroft Air</div>
        <div style="display:flex; align-items:center; gap:7px; margin-top:3px; white-space:nowrap;">
          <span style="display:inline-flex; align-items:center; gap:4px; font-size:11.5px; font-weight:700; color:#5a8a6c;">
            <span style="width:6px; height:6px; border-radius:50%; background:#34a853; display:inline-block;"></span>
            <span id="hdr-online">—</span>
          </span>
          <span style="color:#d8cfc2;">·</span>
          <span id="hdr-updated" style="font-size:11.5px; font-weight:600; color:#a99a88;">—</span>
        </div>
      </div>
      <div style="text-align:right;">
        <div id="hdr-attention" style="font-size:20px; font-weight:800; color:#c63b30; line-height:1;">0</div>
        <div style="font-size:9.5px; color:#a99a88; font-weight:700; letter-spacing:.04em; text-transform:uppercase; margin-top:2px;">to fix</div>
      </div>
    </div>

    <!-- Hero card -->
    <div id="hero-card" style="background:linear-gradient(135deg,#ff8a5c,#ef5e4e); border-radius:22px; padding:15px 17px; margin-bottom:13px; box-shadow:0 14px 24px -13px rgba(239,94,78,.6); position:relative; overflow:hidden;">
      <div style="position:absolute; right:-20px; top:-20px; width:84px; height:84px; border-radius:50%; background:rgba(255,255,255,.12); pointer-events:none;"></div>
      <div style="display:flex; align-items:center; gap:13px; position:relative;">
        <div id="hero-icon" style="width:46px; height:46px; border-radius:50%; background:rgba(255,255,255,.24); display:flex; align-items:center; justify-content:center; flex-shrink:0;"></div>
        <div style="color:#fff; line-height:1.18; min-width:0;">
          <div id="hero-title1" style="font-size:16.5px; font-weight:800; letter-spacing:-.01em;"></div>
          <div id="hero-title2" style="font-size:16.5px; font-weight:800; letter-spacing:-.01em;"></div>
        </div>
      </div>
      <div id="hero-subtitle" style="font-size:12px; color:#fff; opacity:.94; font-weight:600; margin-top:10px; position:relative;"></div>
    </div>

    <!-- Map / List toggle -->
    <div style="display:flex; gap:4px; background:#f0e9e0; border-radius:13px; padding:4px; margin-bottom:13px;">
      <button id="btn-map"  class="tab-btn active"  onclick="setView('map')">Map</button>
      <button id="btn-list" class="tab-btn inactive" onclick="setView('list')">List</button>
    </div>

    <!-- Map view -->
    <div id="map-view" style="background:#fff; border-radius:24px; padding:13px 12px 9px; box-shadow:0 8px 20px -12px rgba(120,90,60,.28);">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:0 5px 6px;">
        <span style="font-size:12px; font-weight:800; color:#8a7c6c;">Your home</span>
        <span style="display:flex; align-items:center; gap:9px; font-size:10px; font-weight:700;">
          <span style="display:inline-flex; align-items:center; gap:4px; color:#5a8a6c;">
            <span style="width:13px; height:2.5px; border-radius:2px; background:#8fcfa6; display:inline-block;"></span>live
          </span>
          <span style="display:inline-flex; align-items:center; gap:4px; color:#bd5a51;">
            <span style="width:13px; height:2.5px; border-radius:2px; background:#ef6b62; display:inline-block;"></span>offline
          </span>
        </span>
      </div>
      <div style="position:relative; width:100%; height:280px;">
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute; inset:0; width:100%; height:100%;">
          <!-- House outline -->
          <polyline points="8,28 50,7 92,28" fill="none" stroke="#efe7dc" stroke-width="1.4" vector-effect="non-scaling-stroke" stroke-linejoin="round"></polyline>
          <line x1="8"  y1="28" x2="8"  y2="96" stroke="#f1ebe2" stroke-width="1.4" vector-effect="non-scaling-stroke" stroke-linecap="round"></line>
          <line x1="92" y1="28" x2="92" y2="96" stroke="#f1ebe2" stroke-width="1.4" vector-effect="non-scaling-stroke" stroke-linecap="round"></line>
          <line x1="8"  y1="96" x2="92" y2="96" stroke="#efe7dc" stroke-width="1.4" vector-effect="non-scaling-stroke" stroke-linecap="round"></line>
          <line x1="8"  y1="44" x2="92" y2="44" stroke="#f6f1ea" stroke-width="1.2" vector-effect="non-scaling-stroke"></line>
          <line x1="8"  y1="72" x2="92" y2="72" stroke="#f6f1ea" stroke-width="1.2" vector-effect="non-scaling-stroke"></line>
          <!-- Mesh lines radiating from office hub (30,55) -->
          <line id="mesh-bedroom"     x1="30" y1="55" x2="18" y2="22" stroke="#8fcfa6" stroke-width="2" stroke-dasharray="1 6" stroke-linecap="round" vector-effect="non-scaling-stroke" style="animation:flow 2.6s linear infinite;"></line>
          <line id="mesh-toddler"     x1="30" y1="55" x2="50" y2="22" stroke="#8fcfa6" stroke-width="2" stroke-dasharray="1 6" stroke-linecap="round" vector-effect="non-scaling-stroke" style="animation:flow 2.6s linear infinite;"></line>
          <line id="mesh-wifesoffice" x1="30" y1="55" x2="82" y2="22" stroke="#8fcfa6" stroke-width="2" stroke-dasharray="1 6" stroke-linecap="round" vector-effect="non-scaling-stroke" style="animation:flow 2.6s linear infinite;"></line>
          <line id="mesh-kitchen"     x1="30" y1="55" x2="72" y2="55" stroke="#8fcfa6" stroke-width="2" stroke-dasharray="1 6" stroke-linecap="round" vector-effect="non-scaling-stroke" style="animation:flow 2.6s linear infinite;"></line>
          <line id="mesh-basement"    x1="30" y1="55" x2="50" y2="83" stroke="#8fcfa6" stroke-width="2" stroke-dasharray="1 6" stroke-linecap="round" vector-effect="non-scaling-stroke" style="animation:flow 2.6s linear infinite;"></line>
        </svg>
        <!-- Room cards (absolutely positioned over the SVG) -->
        <div id="map-card-office"      style="position:absolute; left:30%; top:55%; transform:translate(-50%,-50%); width:104px;"></div>
        <div id="map-card-bedroom"     style="position:absolute; left:18%; top:22%; transform:translate(-50%,-50%); width:104px;"></div>
        <div id="map-card-toddler"     style="position:absolute; left:50%; top:22%; transform:translate(-50%,-50%); width:104px;"></div>
        <div id="map-card-wifesoffice" style="position:absolute; left:82%; top:22%; transform:translate(-50%,-50%); width:104px;"></div>
        <div id="map-card-kitchen"     style="position:absolute; left:72%; top:55%; transform:translate(-50%,-50%); width:104px;"></div>
        <div id="map-card-basement"    style="position:absolute; left:50%; top:83%; transform:translate(-50%,-50%); width:104px;"></div>
      </div>
    </div>

    <!-- List view -->
    <div id="list-view" style="background:#fff; border-radius:24px; padding:6px; box-shadow:0 8px 20px -12px rgba(120,90,60,.28); display:none;">
      <div id="list-container"></div>
    </div>

    <!-- Suggested actions -->
    <div style="margin-top:13px;">
      <div style="font-size:11px; font-weight:800; color:#bcae9e; letter-spacing:.04em; text-transform:uppercase; padding:0 4px 7px;">Suggested</div>
      <div style="background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 6px 14px -10px rgba(120,90,60,.3);">
        <div id="actions-container"></div>
      </div>
    </div>

  </div>
</div>

<script>
  const NODE_LABELS  = {{ node_labels | tojson }};
  const NODES        = {{ nodes | tojson }};
  const NODE_SENSORS = {{ node_sensors | tojson }};
  const ECO2_NODES   = {{ eco2_nodes | tojson }};
  const ENS160_NODES = {{ ens160_nodes | tojson }};

  const STALE_MS = 5 * 60 * 1000;

  const SHORT_NAMES = {
    office:      'Office',
    bedroom:     'Bedroom',
    toddler:     "Mari's",
    wifesoffice: "Em's",
    kitchen:     'Kitchen',
    basement:    'Basement',
  };

  const SOFT = {
    GOOD:    { bg:'#e9f7ee', text:'#5a8a6c', num:'#2f7d52', dotBg:'#c4ead2', face:'check' },
    OK:      { bg:'#fcefd8', text:'#9d7530', num:'#a56b15', dotBg:'#f2d8a0', face:'flat'  },
    POOR:    { bg:'#fcdecb', text:'#ad5c28', num:'#ac4810', dotBg:'#f3c08a', face:'alert' },
    BAD:     { bg:'#f9d2ce', text:'#a83530', num:'#b52520', dotBg:'#eeaaa6', face:'alert' },
    OFFLINE: { bg:'#f3f1ed', text:'#b3aa9e', num:'#b3aa9e', dotBg:'#e6e0d6', face:'off'   },
  };

  function ic(name, color, size) {
    const s = size || 12;
    const attr = `viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="${color || 'currentColor'}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"`;
    const paths = {
      window: '<rect x="4" y="4" width="16" height="16" rx="1.5"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/>',
      check:  '<polyline points="20 6 9 17 4 12"/>',
      flat:   '<line x1="5" y1="12" x2="19" y2="12"/>',
      alert:  '<line x1="12" y1="7" x2="12" y2="13"/><line x1="12" y1="16.6" x2="12" y2="16.7"/>',
      off:    '<line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>',
    };
    return `<svg ${attr}>${paths[name] || paths.flat}</svg>`;
  }

  function nodeStatus(node, data) {
    if (!data || !data.timestamp) return 'OFFLINE';
    if (Date.now() - new Date(data.timestamp).getTime() > STALE_MS) return 'OFFLINE';
    if (ECO2_NODES.includes(node)) {
      const pm = data.pm25;
      if (pm == null) return 'OFFLINE';
      if (pm < 12) return 'GOOD';
      if (pm < 35) return 'OK';
      if (pm < 55) return 'POOR';
      return 'BAD';
    }
    const co2 = data.co2_ppm;
    if (co2 == null) return 'OFFLINE';
    if (co2 < 800)  return 'GOOD';
    if (co2 < 1000) return 'OK';
    if (co2 < 1500) return 'POOR';
    return 'BAD';
  }

  function primaryMetric(node, data) {
    if (ECO2_NODES.includes(node)) {
      const v = data && data.pm25 != null ? data.pm25.toFixed(1) : '—';
      return { val: v, unit: 'µg/m³', label: 'PM2.5' };
    }
    const v = data && data.co2_ppm != null ? Math.round(data.co2_ppm) : '—';
    return { val: String(v), unit: 'ppm', label: 'CO₂' };
  }

  function relAge(ts, stale) {
    if (stale || !ts) return 'offline';
    const diff = Date.now() - new Date(ts).getTime();
    if (diff < 0 || isNaN(diff)) return '';
    if (diff < 60000)   return `${Math.round(diff / 1000)}s`;
    if (diff < 3600000) return `${Math.round(diff / 60000)}m`;
    return 'old';
  }

  // ── View toggle ──────────────────────────────────────────────────────────────

  let currentView = localStorage.getItem('bancroft_view') || 'map';

  function setView(v) {
    currentView = v;
    localStorage.setItem('bancroft_view', v);
    document.getElementById('map-view').style.display  = v === 'map'  ? '' : 'none';
    document.getElementById('list-view').style.display = v === 'list' ? '' : 'none';
    document.getElementById('btn-map').className  = 'tab-btn ' + (v === 'map'  ? 'active' : 'inactive');
    document.getElementById('btn-list').className = 'tab-btn ' + (v === 'list' ? 'active' : 'inactive');
  }

  // ── Render: header ───────────────────────────────────────────────────────────

  function renderHeader(allData) {
    let online = 0, attention = 0;
    NODES.forEach(node => {
      const st = nodeStatus(node, allData[node]);
      if (st !== 'OFFLINE') {
        online++;
        if (st === 'POOR' || st === 'BAD') attention++;
      }
    });
    document.getElementById('hdr-online').textContent    = `${online}/${NODES.length} online`;
    document.getElementById('hdr-attention').textContent = String(attention);
  }

  // ── Render: hero card ────────────────────────────────────────────────────────

  function renderHero(allData) {
    // Score each online node; higher = more urgent
    // CO2 >= 1500 → 4, CO2 1000-1499 → 3, PM2.5 > 35 → 2, else → 0
    let bestNode = null, bestScore = 0;
    NODES.forEach(node => {
      const d = allData[node];
      const st = nodeStatus(node, d);
      if (st === 'OFFLINE') return;
      let score = 0;
      if (!ECO2_NODES.includes(node) && d.co2_ppm != null) {
        if (d.co2_ppm >= 1500) score = 4;
        else if (d.co2_ppm >= 1000) score = 3;
      } else if (ECO2_NODES.includes(node) && d.pm25 != null && d.pm25 > 35) {
        score = 2;
      }
      if (score > bestScore) { bestScore = score; bestNode = node; }
    });

    let title1, title2 = '', subtitle, icon, gradient, shadow;

    if (bestNode && bestScore >= 2) {
      gradient = 'linear-gradient(135deg,#ff8a5c,#ef5e4e)';
      shadow   = '0 14px 24px -13px rgba(239,94,78,.6)';
      const d        = allData[bestNode];
      const roomName = NODE_LABELS[bestNode] || bestNode;
      if (!ECO2_NODES.includes(bestNode)) {
        const co2 = Math.round(d.co2_ppm);
        if (d.co2_ppm >= 1500) {
          title1   = 'Open a window in';
          title2   = `the ${roomName}`;
          subtitle = `It's stuffy — CO₂ is ${co2} ppm and still climbing.`;
          icon     = ic('window', '#fff', 23);
        } else {
          title1   = 'Air out the';
          title2   = roomName;
          subtitle = `CO₂ is elevated at ${co2} ppm.`;
          icon     = ic('window', '#fff', 23);
        }
      } else {
        title1   = 'Run the kitchen hood';
        subtitle = `PM2.5 is ${Math.round(d.pm25)} µg/m³.`;
        icon     = ic('alert', '#fff', 23);
      }
    } else {
      gradient = 'linear-gradient(135deg,#8fcfa6,#34a853)';
      shadow   = '0 14px 24px -13px rgba(52,200,89,.4)';
      title1   = 'Air quality looks good';
      subtitle = 'All rooms are within normal range.';
      icon     = ic('check', '#fff', 23);
    }

    const card = document.getElementById('hero-card');
    card.style.background  = gradient;
    card.style.boxShadow   = shadow;
    document.getElementById('hero-icon').innerHTML     = icon;
    document.getElementById('hero-title1').textContent = title1;
    const t2 = document.getElementById('hero-title2');
    t2.textContent    = title2;
    t2.style.display  = title2 ? '' : 'none';
    document.getElementById('hero-subtitle').textContent = subtitle;
  }

  // ── Render: map cards ────────────────────────────────────────────────────────

  function renderMapCards(allData) {
    NODES.forEach(node => {
      const container = document.getElementById(`map-card-${node}`);
      if (!container) return;

      const d      = allData[node];
      const st     = nodeStatus(node, d);
      const s      = SOFT[st];
      const m      = primaryMetric(node, d);
      const stale  = !d || !d.timestamp || Date.now() - new Date(d.timestamp).getTime() > STALE_MS;
      const online = st !== 'OFFLINE';
      const age    = relAge(d && d.timestamp, stale);

      // Update mesh connectivity line
      if (node !== 'office') {
        const line = document.getElementById(`mesh-${node}`);
        if (line) {
          if (online) {
            line.setAttribute('stroke', '#8fcfa6');
            line.setAttribute('stroke-dasharray', '1 6');
            line.style.animation = 'flow 2.6s linear infinite';
          } else {
            line.setAttribute('stroke', '#ef6b62');
            line.setAttribute('stroke-dasharray', '4 5');
            line.style.animation = 'none';
          }
        }
      }

      container.innerHTML = `
        <div onclick="window.location.href='/room/${node}'" style="background:${s.bg}; border-radius:17px; padding:7px 11px 8px; box-shadow:0 6px 13px -7px rgba(120,90,60,.3); opacity:${online ? '1' : '.66'}; cursor:pointer;">
          <div style="display:flex; align-items:center; gap:6px; margin-bottom:2px;">
            <span style="width:16px; height:16px; border-radius:50%; background:${s.dotBg}; display:flex; align-items:center; justify-content:center; flex-shrink:0;">${ic(s.face, s.num, 11)}</span>
            <span style="font-size:10px; font-weight:800; color:${s.text}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;">${SHORT_NAMES[node] || node}</span>
          </div>
          <div style="display:flex; align-items:baseline; gap:3px;">
            <span style="font-size:18px; font-weight:800; letter-spacing:-.02em; color:${s.num}; line-height:1;">${m.val}</span>
            <span style="font-size:8px; color:${s.text}; font-weight:700; opacity:.7;">${m.unit}</span>
            <span id="map-age-${node}" style="margin-left:auto; font-size:8.5px; font-weight:800; color:${online ? '#cbbfb0' : '#ef6b62'};">${age}</span>
          </div>
        </div>`;
    });
  }

  // ── Render: list rows ────────────────────────────────────────────────────────

  function renderListRows(allData) {
    const rows = NODES.map((node, i) => {
      const d      = allData[node];
      const st     = nodeStatus(node, d);
      const s      = SOFT[st];
      const m      = primaryMetric(node, d);
      const stale  = !d || !d.timestamp || Date.now() - new Date(d.timestamp).getTime() > STALE_MS;
      const online = st !== 'OFFLINE';
      const age    = relAge(d && d.timestamp, stale);
      const sub    = ECO2_NODES.includes(node) ? 'PM2.5' : 'CO₂';
      const sep    = i > 0 ? `<div style="height:1px; background:#f4efe8; margin:0 12px;"></div>` : '';

      return `${sep}
        <div onclick="window.location.href='/room/${node}'" style="display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:18px; opacity:${online ? '1' : '.66'}; cursor:pointer;">
          <span style="width:30px; height:30px; border-radius:50%; background:${s.dotBg}; display:flex; align-items:center; justify-content:center; flex-shrink:0;">${ic(s.face, s.num, 15)}</span>
          <div style="min-width:0; flex:1;">
            <div style="font-size:13.5px; font-weight:800; color:#3a322a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${NODE_LABELS[node] || node}</div>
            <div id="list-age-${node}" style="font-size:10.5px; font-weight:700; color:#bcae9e; margin-top:2px;">${sub} · ${age}</div>
          </div>
          <div style="display:flex; align-items:baseline; gap:3px; flex-shrink:0;">
            <span style="font-size:18px; font-weight:800; color:${s.num}; letter-spacing:-.02em;">${m.val}</span>
            <span style="font-size:9px; font-weight:700; color:${s.text}; opacity:.7;">${m.unit}</span>
          </div>
          <span style="width:7px; height:7px; border-radius:50%; background:${online ? '#34a853' : '#ef6b62'}; flex-shrink:0;"></span>
        </div>`;
    });
    document.getElementById('list-container').innerHTML = rows.join('');
  }

  // ── Render: suggested actions ────────────────────────────────────────────────

  function renderActions(allData) {
    const BAD  = '#b52520';
    const POOR = '#ac4810';
    const acts = [];

    NODES.forEach(node => {
      const d  = allData[node];
      const st = nodeStatus(node, d);
      if (st === 'OFFLINE' || !d) return;
      const room = NODE_LABELS[node] || node;

      if (!ECO2_NODES.includes(node)) {
        if (d.co2_ppm != null && d.co2_ppm >= 1500)
          acts.push({ title:'Open a window', room, code:`CO₂ ${Math.round(d.co2_ppm)} ▲`, color:BAD,  sev:2 });
        else if (d.co2_ppm != null && d.co2_ppm >= 1000)
          acts.push({ title:'Air it out',    room, code:`CO₂ ${Math.round(d.co2_ppm)} ▲`, color:POOR, sev:1 });
        if (d.tvoc != null && d.tvoc > 250)
          acts.push({ title:'Air it out',    room, code:`TVOC ${Math.round(d.tvoc)} ▲`,   color:POOR, sev:1 });
      } else {
        if (d.pm25 != null && d.pm25 > 35)
          acts.push({ title:'Run the hood',  room, code:`PM2.5 ${Math.round(d.pm25)} ▲`,  color:POOR, sev:1 });
      }
    });

    acts.sort((a, b) => b.sev - a.sev);
    const top = acts.slice(0, 3);
    const container = document.getElementById('actions-container');

    if (top.length === 0) {
      container.innerHTML = `
        <div style="display:flex; align-items:center; gap:10px; padding:10px 13px;">
          <span style="width:9px; height:9px; border-radius:3px; background:#34a853; flex-shrink:0;"></span>
          <span style="font-size:13px; font-weight:800; color:#3a322a;">No actions needed</span>
          <span style="margin-left:auto; font-size:11px; font-weight:700; color:#34a853; font-family:'IBM Plex Mono',monospace;">All clear</span>
        </div>`;
      return;
    }

    container.innerHTML = top.map((a, i) => `
      <div style="display:flex; align-items:center; gap:10px; padding:10px 13px; border-top:1px solid ${i === 0 ? 'transparent' : '#f4efe8'};">
        <span style="width:9px; height:9px; border-radius:3px; background:${a.color}; flex-shrink:0;"></span>
        <span style="font-size:13px; font-weight:800; color:#3a322a;">${a.title}</span>
        <span style="font-size:13px; font-weight:700; color:#a99a88;">${a.room}</span>
        <span style="margin-left:auto; font-size:11px; font-weight:700; color:${a.color}; font-family:'IBM Plex Mono',monospace; white-space:nowrap;">${a.code}</span>
      </div>`).join('');
  }

  // ── Clock and rolling timestamps ─────────────────────────────────────────────

  let _lastData = {};

  function tickTimestamps() {
    let latestTs = null;
    NODES.forEach(node => {
      const d = _lastData[node];
      if (!d || !d.timestamp) return;
      const stale = Date.now() - new Date(d.timestamp).getTime() > STALE_MS;
      const age   = relAge(d.timestamp, stale);
      const sub   = ECO2_NODES.includes(node) ? 'PM2.5' : 'CO₂';

      const mapAge = document.getElementById(`map-age-${node}`);
      if (mapAge) {
        mapAge.textContent = age;
        mapAge.style.color = stale ? '#ef6b62' : '#cbbfb0';
      }
      const listAge = document.getElementById(`list-age-${node}`);
      if (listAge) listAge.textContent = `${sub} · ${age}`;

      if (!latestTs || new Date(d.timestamp) > new Date(latestTs)) latestTs = d.timestamp;
    });

    if (latestTs) {
      const diff = Date.now() - new Date(latestTs).getTime();
      const updated = diff < 60000
        ? `${Math.round(diff / 1000)}s ago`
        : `${Math.round(diff / 60000)}m ago`;
      document.getElementById('hdr-updated').textContent = updated;
    }
  }

  // ── Data fetch ───────────────────────────────────────────────────────────────

  async function refreshCurrent() {
    try {
      const allData = await fetch('/api/now').then(r => r.json());
      _lastData = allData;
      renderHeader(allData);
      renderHero(allData);
      renderMapCards(allData);
      renderListRows(allData);
      renderActions(allData);
    } catch (e) {
      console.warn('refreshCurrent error:', e);
    }
  }

  // ── Boot ─────────────────────────────────────────────────────────────────────

  setView(currentView);
  setInterval(tickTimestamps, 1000);
  refreshCurrent();
  setInterval(refreshCurrent, 10000);
</script>
</body>
</html>
