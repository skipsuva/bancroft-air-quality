<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ node_label }} — Bancroft Air</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    @keyframes livepulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .noscroll::-webkit-scrollbar { display: none; }
    .noscroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body style="min-height:100vh; background:#e9eaee; font-family:'Nunito',sans-serif; color:#3a322a; padding:16px 16px 70px; margin:0;">

<div style="max-width:420px; margin:0 auto; background:#fbf7f2; border-radius:24px; overflow:hidden; display:flex; flex-direction:column; min-height:calc(100vh - 32px);">

  <!-- Status bar -->
  <div style="display:flex; justify-content:space-between; align-items:center; padding:14px 28px 6px; font-size:13px; font-weight:700; color:#4a4036; flex-shrink:0;">
    <span id="status-time">—</span>
    <span style="display:flex; gap:5px; align-items:center;">
      <span style="width:7px; height:7px; border-radius:50%; background:#34c759; display:inline-block; animation:livepulse 2.4s ease-in-out infinite;"></span>
      <span style="font-size:11px; color:#a99a88; font-weight:700;">live</span>
    </span>
  </div>

  <!-- Detail header -->
  <div style="display:flex; align-items:center; gap:8px; padding:8px 18px 10px; border-bottom:1px solid #f4efe8; flex-shrink:0;">
    <button onclick="history.back()" style="border:none; background:none; cursor:pointer; padding:4px 2px; display:flex; align-items:center;">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#3a322a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span style="font-size:18px; font-weight:800; letter-spacing:-.01em; color:#3a322a; flex:1;">{{ node_label }}</span>
    <span id="status-badge" style="font-size:11px; font-weight:800; border-radius:20px; padding:3px 10px;">—</span>
  </div>

  <!-- Metric selector pills -->
  <div id="metric-pills" class="noscroll" style="display:flex; gap:5px; padding:10px 16px 0; overflow-x:auto; flex-shrink:0;"></div>

  <!-- Hero container -->
  <div id="hero" style="margin:10px 16px 12px; border-radius:22px; padding:14px 18px; flex-shrink:0; background:#f3f1ed;">
    <div id="hero-label" style="font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; color:#b3aa9e;"></div>
    <div style="display:flex; align-items:baseline; gap:8px;">
      <span id="hero-value" style="font-size:52px; font-weight:800; letter-spacing:-.03em; line-height:1; color:#b3aa9e;">—</span>
      <div>
        <div id="hero-unit" style="font-size:13px; font-weight:700; opacity:.8; color:#b3aa9e;"></div>
        <div id="hero-trend" style="font-size:11px; font-weight:700; opacity:.7; color:#b3aa9e;"></div>
      </div>
    </div>
    <div id="hero-staleness" style="font-size:11.5px; font-weight:700; opacity:.75; margin-top:8px; color:#b3aa9e;"></div>
  </div>

  <!-- Main chart card -->
  <div style="margin:0 16px; background:#fff; border-radius:22px; padding:13px 15px 11px; box-shadow:0 6px 16px -10px rgba(120,90,60,.3); flex-shrink:0;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <span id="chart-label" style="font-size:10.5px; font-weight:800; color:#bcae9e; text-transform:uppercase; letter-spacing:.05em;"></span>
      <div style="display:flex; gap:3px;">
        <button onclick="selectRange('6h')" id="range-6h" style="border:none; cursor:pointer; border-radius:12px; padding:3px 9px; font-size:10px; font-weight:800; font-family:'Nunito',sans-serif;">6H</button>
        <button onclick="selectRange('1d')" id="range-1d" style="border:none; cursor:pointer; border-radius:12px; padding:3px 9px; font-size:10px; font-weight:800; font-family:'Nunito',sans-serif;">1D</button>
        <button onclick="selectRange('1w')" id="range-1w" style="border:none; cursor:pointer; border-radius:12px; padding:3px 9px; font-size:10px; font-weight:800; font-family:'Nunito',sans-serif;">1W</button>
      </div>
    </div>
    <div id="main-chart" style="min-height:128px; display:flex; align-items:center; justify-content:center; color:#d0c6b8; font-size:12px;">Loading…</div>
    <div style="display:flex; justify-content:space-between; margin-top:6px;">
      <span id="x-left"  style="font-size:9px; font-weight:700; color:#d0c6b8;"></span>
      <span id="x-mid"   style="font-size:9px; font-weight:700; color:#d0c6b8;"></span>
      <span id="x-right" style="font-size:9px; font-weight:700; color:#d0c6b8;">now</span>
    </div>
  </div>

  <!-- Mini grid -->
  <div class="noscroll" style="flex:1; overflow-y:auto; padding:10px 16px 20px;">
    <div style="font-size:10px; font-weight:800; color:#bcae9e; text-transform:uppercase; letter-spacing:.05em; margin-bottom:9px;">All readings</div>
    <div id="mini-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
  </div>

</div>

<script>
  const NODE         = {{ node | tojson }};
  const NODE_SENSORS = {{ node_sensors | tojson }};
  const ECO2_NODES   = {{ eco2_nodes | tojson }};
  const STALE_MS     = 5 * 60 * 1000;

  const METRIC_CONFIGS = {
    co2:  { label:'CO₂',        unit:'ppm',   color:'#c2581f', field:'co2_ppm',      thresholds:[{v:800,c:'#2f7d52'},{v:1000,c:'#b5781f'},{v:1500,c:'#c63b30'}] },
    temp: { label:'Temperature', unit:'°F',    color:'#4a7eb5', field:'temp_c',       thresholds:[], convert: v => +(v * 9/5 + 32).toFixed(1) },
    hum:  { label:'Humidity',    unit:'%RH',   color:'#5a8a6c', field:'humidity_pct', thresholds:[{v:30,c:'#c2a21f'},{v:70,c:'#c2a21f'}] },
    aqi:  { label:'AQI',         unit:'index', color:'#7c5cbf', field:'aqi',          thresholds:[{v:2,c:'#c2a21f'},{v:3,c:'#c2581f'}], fixedMin:0, fixedMax:5 },
    tvoc: { label:'TVOC',        unit:'ppb',   color:'#b87333', field:'tvoc',         thresholds:[{v:150,c:'#34a853'},{v:250,c:'#c2a21f'},{v:500,c:'#c2581f'}] },
    pm25: { label:'PM2.5',       unit:'µg/m³', color:'#bd5a51', field:'pm25',         thresholds:[{v:12,c:'#34a853'},{v:35,c:'#c2a21f'}] },
  };

  const STATUS_PALETTE = {
    GOOD:    { bg:'#e9f7ee', text:'#5a8a6c', num:'#2f7d52', label:'Good'    },
    OK:      { bg:'#fdf4e3', text:'#ab8748', num:'#b5781f', label:'OK'      },
    POOR:    { bg:'#fdeede', text:'#bd7048', num:'#c2581f', label:'Poor'    },
    BAD:     { bg:'#fde8e6', text:'#bd5a51', num:'#c63b30', label:'Bad'     },
    OFFLINE: { bg:'#f3f1ed', text:'#b3aa9e', num:'#b3aa9e', label:'Offline' },
  };

  // Build ordered metric list for this node
  const sensors = NODE_SENSORS[NODE] || {};
  const AVAILABLE_METRICS = [];
  if (ECO2_NODES.includes(NODE)) {
    if (sensors.pm)       AVAILABLE_METRICS.push('pm25');
  } else {
    if (sensors.co2)      AVAILABLE_METRICS.push('co2');
  }
  if (sensors.temp)       AVAILABLE_METRICS.push('temp');
  if (sensors.humidity)   AVAILABLE_METRICS.push('hum');
  if (sensors.aqi)        AVAILABLE_METRICS.push('aqi');
  if (sensors.tvoc)       AVAILABLE_METRICS.push('tvoc');

  const PRIMARY_METRIC = AVAILABLE_METRICS[0] || 'co2';

  let currentMetric  = localStorage.getItem(`bancroft_metric_${NODE}`) || PRIMARY_METRIC;
  if (!AVAILABLE_METRICS.includes(currentMetric)) currentMetric = PRIMARY_METRIC;

  let currentRange   = localStorage.getItem('bancroft_range') || '6h';
  let _currentData   = null;
  let _historyData   = [];
  let _lastTimestamp = null;

  function nodeStatus(data) {
    if (!data || !data.timestamp) return 'OFFLINE';
    if (Date.now() - new Date(data.timestamp).getTime() > STALE_MS) return 'OFFLINE';
    if (ECO2_NODES.includes(NODE)) {
      const pm = data.pm25;
      if (pm == null) return 'OFFLINE';
      if (pm < 12) return 'GOOD';
      if (pm < 35) return 'OK';
      if (pm < 55) return 'POOR';
      return 'BAD';
    }
    const co2 = data.co2_ppm;
    if (co2 == null) return 'OFFLINE';
    if (co2 < 800)  return 'GOOD';
    if (co2 < 1000) return 'OK';
    if (co2 < 1500) return 'POOR';
    return 'BAD';
  }

  function extractValue(metricKey, data) {
    if (!data) return null;
    const cfg = METRIC_CONFIGS[metricKey];
    const raw = data[cfg.field];
    if (raw == null) return null;
    return cfg.convert ? cfg.convert(raw) : raw;
  }

  function formatValue(metricKey, val) {
    if (val == null) return '—';
    if (metricKey === 'temp') return val.toFixed(1);
    if (metricKey === 'pm25') return val.toFixed(1);
    if (metricKey === 'hum')  return Math.round(val);
    return Math.round(val);
  }

  function buildSVGChart(rows, metricKey, width, height, gradId) {
    const cfg  = METRIC_CONFIGS[metricKey];
    const vals = rows.map(r => {
      const v = r[cfg.field];
      if (v == null) return null;
      return cfg.convert ? cfg.convert(v) : v;
    }).filter(v => v != null);

    if (vals.length < 2) return null;

    const step = Math.max(1, Math.floor(vals.length / 44));
    const pts  = vals.filter((_, i) => i % step === 0 || i === vals.length - 1);

    const mn   = cfg.fixedMin !== undefined ? cfg.fixedMin : Math.min(...pts) * 0.9;
    const mx   = cfg.fixedMax !== undefined ? cfg.fixedMax : Math.max(...pts) * 1.1;
    const span = (mx - mn) || 1;

    const coords = pts.map((v, i) => ({
      x: +((i / (pts.length - 1)) * width).toFixed(2),
      y: +(height - ((Math.min(mx, Math.max(mn, v)) - mn) / span) * (height - 5) - 2.5).toFixed(2),
    }));

    const lineStr = coords.map(p => `${p.x},${p.y}`).join(' ');
    const fillStr = `0,${height} ${lineStr} ${width},${height}`;
    const last    = coords[coords.length - 1];

    const threshLines = cfg.thresholds.map(t => {
      if (t.v <= mn || t.v >= mx) return '';
      const ty = +(height - ((t.v - mn) / span) * (height - 5) - 2.5).toFixed(2);
      return `<line x1="0" y1="${ty}" x2="${width}" y2="${ty}" stroke="${t.c}" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.55"/>`;
    }).join('');

    const trend = vals[vals.length - 1] > vals[0] * 1.06 ? '▲'
                : vals[vals.length - 1] < vals[0] * 0.94 ? '▼' : '—';

    const svg = `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="display:block;overflow:visible">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="${cfg.color}" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="${cfg.color}" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      ${threshLines}
      <polygon points="${fillStr}" fill="url(#${gradId})"/>
      <polyline points="${lineStr}" fill="none" stroke="${cfg.color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${last.x}" cy="${last.y}" r="2.8" fill="${cfg.color}" stroke="#fbf7f2" stroke-width="1.4"/>
    </svg>`;

    return { svg, trend };
  }

  function renderPills() {
    document.getElementById('metric-pills').innerHTML = AVAILABLE_METRICS.map(mk => {
      const cfg = METRIC_CONFIGS[mk];
      const act = mk === currentMetric;
      return `<button onclick="selectMetric('${mk}')" style="border:none; cursor:pointer; border-radius:20px; padding:6px 12px; font-size:11.5px; font-weight:800; flex-shrink:0; white-space:nowrap; transition:all .15s; background:${act ? cfg.color : '#f0e9e0'}; color:${act ? '#fff' : '#a99a88'}; font-family:'Nunito',sans-serif;">${cfg.label}</button>`;
    }).join('');
  }

  function renderHero(data, histRows) {
    const st  = nodeStatus(data);
    const pal = STATUS_PALETTE[st];
    const cfg = METRIC_CONFIGS[currentMetric];

    const badge = document.getElementById('status-badge');
    badge.textContent      = pal.label;
    badge.style.color      = pal.num;
    badge.style.background = pal.bg;

    const hero = document.getElementById('hero');
    hero.style.background = pal.bg;

    const labelEl = document.getElementById('hero-label');
    labelEl.style.color    = pal.text;
    labelEl.textContent    = cfg.label;

    const valEl = document.getElementById('hero-value');
    valEl.style.color = pal.num;

    const unitEl = document.getElementById('hero-unit');
    unitEl.style.color  = pal.text;
    unitEl.textContent  = cfg.unit;

    const trendEl = document.getElementById('hero-trend');
    trendEl.style.color = pal.text;

    const staleEl = document.getElementById('hero-staleness');
    staleEl.style.color = pal.text;

    if (st === 'OFFLINE') {
      valEl.textContent   = '—';
      trendEl.textContent = '';
      staleEl.textContent = 'Sensor offline';
      _lastTimestamp      = null;
    } else {
      const val = extractValue(currentMetric, data);
      valEl.textContent = val != null ? String(formatValue(currentMetric, val)) : '—';
      _lastTimestamp    = data && data.timestamp;

      if (histRows && histRows.length >= 2) {
        const chart = buildSVGChart(histRows, currentMetric, 294, 128, '__trend__');
        trendEl.textContent = chart ? chart.trend + ' trending' : '';
      } else {
        trendEl.textContent = '';
      }
    }
  }

  function tickHero() {
    const st = nodeStatus(_currentData);
    if (st === 'OFFLINE' || !_lastTimestamp) return;
    const diff = Date.now() - new Date(_lastTimestamp).getTime();
    const age  = diff < 60000 ? `${Math.round(diff / 1000)}s ago` : `${Math.round(diff / 60000)}m ago`;
    document.getElementById('hero-staleness').textContent = `Updated ${age}`;
  }

  function renderMainChart(histRows) {
    const cfg = METRIC_CONFIGS[currentMetric];
    document.getElementById('chart-label').textContent = cfg.label + ' history';

    ['6h', '1d', '1w'].forEach(r => {
      const btn = document.getElementById(`range-${r}`);
      btn.style.background = r === currentRange ? '#3a322a' : 'transparent';
      btn.style.color      = r === currentRange ? '#fff'    : '#c0b4a4';
    });

    const labels = {
      '6h': ['6h ago', '3h ago', 'now'],
      '1d': ['24h ago', '12h ago', 'now'],
      '1w': ['7d ago', '3d ago', 'now'],
    }[currentRange] || ['older', '', 'now'];
    document.getElementById('x-left').textContent  = labels[0];
    document.getElementById('x-mid').textContent   = labels[1];
    document.getElementById('x-right').textContent = labels[2];

    const W     = document.getElementById('main-chart').clientWidth || 320;
    const chart = buildSVGChart(histRows, currentMetric, W, 128, `main-${NODE}-${currentMetric}`);
    const el    = document.getElementById('main-chart');
    el.innerHTML = chart
      ? chart.svg
      : '<div style="height:128px;display:flex;align-items:center;justify-content:center;color:#d0c6b8;font-size:12px;">No data</div>';
  }

  function renderMiniGrid(data, histRows) {
    const others = AVAILABLE_METRICS.filter(mk => mk !== currentMetric);
    document.getElementById('mini-grid').innerHTML = others.map(mk => {
      const cfg    = METRIC_CONFIGS[mk];
      const val    = extractValue(mk, data);
      const valStr = val != null ? String(formatValue(mk, val)) : '—';
      const chart  = buildSVGChart(histRows, mk, 112, 34, `mini-${NODE}-${mk}`);
      return `<div onclick="selectMetric('${mk}')" style="background:#fff; border-radius:16px; padding:10px 12px; box-shadow:0 3px 8px -5px rgba(120,90,60,.2); cursor:pointer;">
        <div style="font-size:9px; font-weight:800; color:#bcae9e; text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px;">${cfg.label}</div>
        ${chart ? chart.svg : '<div style="height:34px;"></div>'}
        <div style="font-size:18px; font-weight:800; color:${cfg.color}; letter-spacing:-.02em; margin-top:3px;">${valStr}<span style="font-size:8px; font-weight:700; color:#bcae9e; margin-left:2px;">${cfg.unit}</span></div>
      </div>`;
    }).join('');
  }

  function selectMetric(key) {
    if (!AVAILABLE_METRICS.includes(key)) return;
    currentMetric = key;
    localStorage.setItem(`bancroft_metric_${NODE}`, key);
    renderPills();
    renderHero(_currentData, _historyData);
    renderMainChart(_historyData);
    renderMiniGrid(_currentData, _historyData);
  }

  async function selectRange(r) {
    currentRange = r;
    localStorage.setItem('bancroft_range', r);
    await fetchHistory();
  }

  async function refreshCurrent() {
    try {
      const allData = await fetch('/api/now').then(r => r.json());
      _currentData  = allData[NODE] || null;
      renderHero(_currentData, _historyData);
      renderMiniGrid(_currentData, _historyData);
    } catch (e) {
      console.warn('refreshCurrent error:', e);
    }
  }

  async function fetchHistory() {
    try {
      const rows   = await fetch(`/api/history?range=${currentRange}&node=${NODE}&smooth=1`).then(r => r.json());
      _historyData = Array.isArray(rows) ? rows : [];
      renderMainChart(_historyData);
      renderMiniGrid(_currentData, _historyData);
      if (_currentData) renderHero(_currentData, _historyData);
    } catch (e) {
      console.warn('fetchHistory error:', e);
    }
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('status-time').textContent =
      now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
  }

  renderPills();
  renderMainChart([]);
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(tickHero, 1000);
  refreshCurrent();
  fetchHistory();
  setInterval(refreshCurrent, 10000);
  setInterval(fetchHistory, 60000);
</script>
</body>
</html>
